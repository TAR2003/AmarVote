# RabbitMQ Configuration for AmarVote Production
# Tuned for a 420M container that may hold thousands of queued emails/chunks.
# The lazy-queue POLICY (RAM stays flat regardless of depth) is applied via rabbitmqctl,
# not this file — run once after boot:
#   rabbitmqctl set_policy lazy-queues "^(email|chunk).*" '{"queue-mode":"lazy"}' --apply-to queues
# Adjust the "^(email|chunk).*" pattern to match your real queue names
# (list them with: rabbitmqctl list_queues name).

# Memory Management
# Start flow-controlling publishers at 60% of the container limit, and begin paging
# messages to disk once memory usage crosses 50% of that watermark.
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.5

# Disk free space limit — block publishers before the disk fills (paged queues live here).
# Monitor actual VM disk space, since deep queues now consume disk instead of RAM.
disk_free_limit.absolute = 500MB

# Default vhost
default_vhost = /

# Management plugin
management.tcp.port = 15672

# AMQP port
listeners.tcp.default = 5672

# Logging
log.file.level = info
log.console = true
log.console.level = info

# Connection limits
num_acceptors.tcp = 10
