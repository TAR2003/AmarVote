# Real client IP when traffic arrives via the ngrok agent → host → Docker published port.
# Ngrok sets X-Forwarded-For to the original client; the TCP peer is usually the Docker gateway.

set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from 127.0.0.0/8;
set_real_ip_from ::1;

real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Prefer the first X-Forwarded-For hop (real client). Fall back to $remote_addr
# after real_ip rewriting when the header is absent.
map $http_x_forwarded_for $client_real_ip {
    ~^([^,\s]+) $1;
    default     $remote_addr;
}

# Ngrok terminates TLS and forwards HTTP to this gateway with X-Forwarded-Proto: https.
map $http_x_forwarded_proto $forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}
