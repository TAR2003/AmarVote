# Dev-only nginx reverse proxy config.
# Routing/timeout/SSE blocks mirror nginx-proxy.conf (without TLS and production rate limits).

limit_req_zone $binary_remote_addr zone=email_code_limit:10m rate=1r/m;
limit_req_status 429;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size      20M;
    client_body_buffer_size   128k;
    client_body_timeout       120s;
    client_header_timeout     30s;
    send_timeout              120s;
    keepalive_timeout         65s;

    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Forwarded-Host  $host;
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        "upgrade";
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;
    proxy_read_timeout      300s;
    proxy_connect_timeout   30s;
    proxy_send_timeout      300s;

    # Email code endpoints - strict anti-abuse limit (1 request per 10 minutes)
    location = /api/auth/register/send-email-code {
        limit_req zone=email_code_limit nodelay;
        proxy_pass http://backend:8080;
    }

    location = /api/auth/password/send-email-code {
        limit_req zone=email_code_limit nodelay;
        proxy_pass http://backend:8080;
    }

    # SSE progress stream — disable buffering for real-time events
    location ~ ^/api/elections/[0-9]+/progress/stream$ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie            $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;
        proxy_set_header Connection '';
        proxy_set_header Cache-Control 'no-cache';
        add_header X-Accel-Buffering no always;
        chunked_transfer_encoding off;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 30s;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Auth endpoints (same paths as production; no extra dev throttle)
    location ~* ^/api/(auth|login|register|password) {
        proxy_pass http://backend:8080;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 30s;
    }

    # WebSocket support
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Frontend app
    location / {
        proxy_pass http://frontend:80;
    }
}
