# Dev-only nginx reverse proxy config.
# This file is intentionally separate from nginx-proxy.conf to avoid impacting production HTTPS.

limit_req_zone $binary_remote_addr zone=email_code_limit:10m rate=1r/m;
limit_req_status 429;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Shared proxy headers
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        "upgrade";

    # Email code endpoints - strict anti-abuse limit (1 request per 10 minutes)
    location = /api/auth/register/send-email-code {
        limit_req zone=email_code_limit nodelay;
        proxy_pass http://backend:8080;
    }

    location = /api/auth/password/send-email-code {
        limit_req zone=email_code_limit nodelay;
        proxy_pass http://backend:8080;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080;
    }

    # Optional websocket path
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Frontend app
    location / {
        proxy_pass http://frontend:80;
    }
}
