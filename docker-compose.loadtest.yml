# Load-test overlay — MANUAL ONLY on the cloud server. Never used by GitHub Actions.
#
# GitHub deploy (.github/workflows/docker-deploy.yml) uses docker-compose.prod.yml ONLY
# and always mounts nginx-proxy.conf (production DDoS rate limits).
#
# On the VM, before k6:
#   docker compose -f docker-compose.prod.yml -f docker-compose.loadtest.yml up -d nginx
#
# After k6 — restore production nginx:
#   docker compose -f docker-compose.prod.yml up -d nginx
#
# See docs/PRODUCTION_DEPLOY_AND_LOADTEST.md

services:
  nginx:
    volumes:
      - ./nginx-proxy.loadtest.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro

  # More sync workers during load test (still within 1024M EG limit)
  electionguard-api:
    environment:
      - GUNICORN_WORKERS=8
      - GUNICORN_THREADS=1
