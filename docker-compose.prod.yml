services:
  postgres:
    image: postgres:15-alpine
    container_name: amarvote_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=amarvote_db
      - POSTGRES_USER=amarvote_user
      - POSTGRES_PASSWORD=amarvote_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/creation/:/docker-entrypoint-initdb.d/:ro
    # No public port — only reachable inside election_net
    expose:
      - "5432"
    networks:
      election_net:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amarvote_user -d amarvote_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 96M

  redis:
    image: redis:7-alpine
    container_name: amarvote_redis
    restart: unless-stopped
    env_file:
      - .env
    # maxmemory must stay below the container memory limit (96M)
    command: redis-server --save "" --maxmemory 80mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"   # Bound to localhost only — use SSH tunnel to access
    networks:
      election_net:
        ipv4_address: 172.20.0.75
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 48M

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: amarvote_rabbitmq
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RABBITMQ_DEFAULT_USER=amarvote_user
      - RABBITMQ_DEFAULT_PASS=amarvote_password
    ports:
      - "5672:5672"                    # AMQP — public (as requested)
      - "127.0.0.1:15672:15672"        # Management UI — localhost only, use SSH tunnel
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      election_net:
        ipv4_address: 172.20.0.25
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 96M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amarvote_backend
    restart: unless-stopped
    env_file:
      - .env
    # No public port — nginx proxies to this internally
    expose:
      - "8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/amarvote_db
      - SPRING_DATASOURCE_USERNAME=amarvote_user
      - SPRING_DATASOURCE_PASSWORD=amarvote_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DEVTOOLS_RESTART_ENABLED=false
      - SPRING_DEVTOOLS_LIVERELOAD_ENABLED=false
      - RAG_SERVICE_URL=http://rag-service:5001
      - BLOCKCHAIN_SERVICE_URL=${VOTING_API_URL}
      - MASTER_KEY_PQ=${MASTER_KEY_PQ}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME}
      - CLOUDINARY_KEY=${CLOUDINARY_KEY}
      - CLOUDINARY_SECRET=${CLOUDINARY_SECRET}
      - LOG_PASSWORD=${LOG_PASSWORD}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - CREDENTIALS_DIRECTORY=/app/data/credentials
      # RabbitMQ Configuration
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=amarvote_user
      - SPRING_RABBITMQ_PASSWORD=amarvote_password
      # Redis Configuration
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=
      # ElectionGuard Service URLs
      - ELECTIONGUARD_API_URL=http://electionguard-api:5000
      - ELECTIONGUARD_WORKER_URL=http://electionguard-worker:5001
      # JVM heap must fit inside 384M container limit
      # JVM overhead is ~60-80M on top of heap, so Xmx=300m is the safe ceiling
      - JAVA_OPTS=-Xms128m -Xmx300m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ExitOnOutOfMemoryError -XX:+UseStringDeduplication
    volumes:
      - maven_repo:/root/.m2
      - credentials_data:/app/data/credentials
      - ./backend/src/main/resources/templates:/app/templates:ro
    networks:
      election_net:
        ipv4_address: 172.20.0.30
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:18-alpine3.20}
        NGINX_IMAGE: ${FRONTEND_NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: amarvote_frontend
    restart: unless-stopped
    env_file:
      - .env
    # No public port — nginx proxies to this internally
    expose:
      - "80"
    networks:
      election_net:
        ipv4_address: 172.20.0.40
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 48M

  nginx:
    image: nginx:1.27-alpine
    container_name: amarvote_nginx
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"     # HTTP (redirects to HTTPS)
      - "443:443"   # HTTPS
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/letsencrypt:ro         # Mount your SSL certs here
      - ./nginx/certbot-webroot:/var/www/certbot  # For certbot HTTP-01 challenge
    networks:
      election_net:
        ipv4_address: 172.20.0.45
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  certbot:
    image: certbot/certbot:latest
    container_name: amarvote_certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet --webroot --webroot-path=/var/www/certbot; sleep 12h & wait $${!}; done"
    deploy:
      resources:
        limits:
          memory: 64M

  electionguard-api:
    build:
      context: ./Microservice
      dockerfile: Dockerfile.api
    container_name: electionguard_api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "5000"
    networks:
      election_net:
        ipv4_address: 172.20.0.10
    environment:
      - FLASK_DEBUG=0
      - MASTER_KEY_PQ=${MASTER_KEY_PQ}
    volumes:
      - ./Microservice/io:/app/io:rw
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 96M

  electionguard-worker:
    build:
      context: ./Microservice
      dockerfile: Dockerfile.worker
    container_name: electionguard_worker
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "5001"
    networks:
      election_net:
        ipv4_address: 172.20.0.11
    environment:
      - FLASK_DEBUG=0
      - MASTER_KEY_PQ=${MASTER_KEY_PQ}
    volumes:
      - ./Microservice/io:/app/io:rw
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

  prometheus:
    image: prom/prometheus:latest
    container_name: amarvote_prometheus
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=3d'
    # localhost only — use SSH tunnel to access
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      election_net:
        ipv4_address: 172.20.0.50
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 48M

  grafana:
    image: grafana/grafana:latest
    container_name: amarvote_grafana
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    # localhost only — use SSH tunnel to access
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      election_net:
        ipv4_address: 172.20.0.60
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 48M

volumes:
  postgres_data:
  maven_repo:
  rag_vectorstore:
  prometheus_data:
  grafana_data:
  credentials_data:
  rabbitmq_data:
  redis_data:

networks:
  election_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1