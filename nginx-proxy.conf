# RATE LIMITING ZONES
limit_req_zone  $binary_remote_addr  zone=api_limit:10m    rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=auth_limit:10m   rate=10r/m;
limit_req_zone  $binary_remote_addr  zone=global_limit:10m rate=100r/m;
limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

# HTTP -> HTTPS REDIRECT (port 80)
server {
    listen 80;
    listen [::]:80;
    server_name amarvote2026.me www.amarvote2026.me;

    # Allow certbot HTTP-01 challenge (Let's Encrypt renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://amarvote2026.me$request_uri;
    }
}

# WWW -> NON-WWW REDIRECT (port 443)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.amarvote2026.me;

    ssl_certificate     /etc/letsencrypt/live/amarvote2026.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amarvote2026.me/privkey.pem;

    return 301 https://amarvote2026.me$request_uri;
}

# MAIN HTTPS SERVER
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name amarvote2026.me;

    # TLS CERTIFICATES
    ssl_certificate     /etc/letsencrypt/live/amarvote2026.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amarvote2026.me/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/amarvote2026.me/chain.pem;

    # TLS HARDENING
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_ecdh_curve            X25519:secp384r1;
    ssl_dhparam               /etc/letsencrypt/dhparam.pem;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    # OCSP STAPLING
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # SECURITY HEADERS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com; connect-src 'self' https://amarvote2026.me wss://amarvote2026.me; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    server_tokens off;

    # CONNECTION LIMITS
    limit_conn conn_limit 20;
    limit_req  zone=global_limit burst=50 nodelay;

    # REQUEST SIZE LIMITS
    client_max_body_size      20M;
    client_body_buffer_size   128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout       30s;
    client_header_timeout     15s;
    send_timeout              30s;
    keepalive_timeout         65s;

    # GZIP COMPRESSION
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/json application/xml application/rss+xml
        application/atom+xml image/svg+xml;

    # PROXY SHARED SETTINGS
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Forwarded-Host  $host;
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        "upgrade";
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;
    proxy_read_timeout      60s;
    proxy_connect_timeout   10s;
    proxy_send_timeout      30s;

    # BACKEND API ROUTES
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend:8080;

        # Strip internal headers from response
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # AUTH ENDPOINTS - Tightest rate limit
    location ~* ^/api/(auth|login|register|password) {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://backend:8080;
    }

    # WEBSOCKET SUPPORT (if your backend uses it)
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # CERTBOT WEBROOT (for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # STATIC FRONTEND
    location / {
        proxy_pass http://frontend:80;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass http://frontend:80;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }
    }

    # BLOCK SENSITIVE PATHS
    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|bak|conf)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # LOGGING
    access_log /var/log/nginx/access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log  warn;
}