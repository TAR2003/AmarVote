# Load-test nginx config — NO per-IP API rate limits (for k6 only).
# NOT used by GitHub deploy. Switch manually on server; restore nginx-proxy.conf after.
# See docs/PRODUCTION_DEPLOY_AND_LOADTEST.md

limit_req_zone $binary_remote_addr zone=email_code_limit:10m rate=1r/m;
limit_req_status 429;

# HTTP -> HTTPS REDIRECT (port 80)
server {
    listen 80;
    listen [::]:80;
    server_name amarvote2026.me www.amarvote2026.me;

    location / {
        return 301 https://amarvote2026.me$request_uri;
    }
}

# WWW -> NON-WWW REDIRECT (port 443)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.amarvote2026.me;

    ssl_certificate     /etc/letsencrypt/cloudflare/origin-bundle.pem;
    ssl_certificate_key /etc/letsencrypt/cloudflare/origin-key.pem;

    return 301 https://amarvote2026.me$request_uri;
}

# MAIN HTTPS SERVER — load-test mode (no per-IP API throttling)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name amarvote2026.me;

    ssl_certificate /etc/letsencrypt/cloudflare/origin-bundle.pem;
    ssl_certificate_key     /etc/letsencrypt/cloudflare/origin-key.pem;
    ssl_trusted_certificate /etc/letsencrypt/cloudflare/cloudflare-ca.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_ecdh_curve            X25519:secp384r1;
    ssl_dhparam               /etc/letsencrypt/dhparam.pem;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:50m;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com; connect-src 'self' https://amarvote2026.me wss://amarvote2026.me; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    server_tokens off;

    # No limit_conn / limit_req on API — tuned for k6 load tests
    client_max_body_size      25M;
    client_body_buffer_size   256k;
    client_header_buffer_size 4k;
    large_client_header_buffers 8 16k;
    client_body_timeout       120s;
    client_header_timeout     30s;
    send_timeout              120s;
    keepalive_timeout         75s;
    keepalive_requests        10000;

    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Forwarded-Host  $host;
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        "";
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           16 32k;
    proxy_busy_buffers_size 64k;
    proxy_read_timeout      180s;
    proxy_connect_timeout   30s;
    proxy_send_timeout      180s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 4;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    location = /api/auth/register/send-email-code {
        limit_req zone=email_code_limit nodelay;
        proxy_pass http://backend:8080;
    }

    location = /api/auth/password/send-email-code {
        limit_req zone=email_code_limit nodelay;
        proxy_pass http://backend:8080;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://frontend:80;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass http://frontend:80;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }
    }

    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|bak|conf)$ {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log warn;
}
