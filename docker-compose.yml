services:
  postgres:
    image: postgres:15-alpine
    container_name: amarvote_postgres_dev
    restart: unless-stopped
    environment:
      - POSTGRES_DB=amarvote_db
      - POSTGRES_USER=amarvote_user
      - POSTGRES_PASSWORD=amarvote_password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./Database/creation/:/docker-entrypoint-initdb.d/:ro
    ports:
      - "5432:5432"
    networks:
      - dev_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amarvote_user -d amarvote_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amarvote_redis_dev
    restart: unless-stopped
    command: redis-server --save "" --maxmemory 80mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - dev_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: amarvote_rabbitmq_dev
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=amarvote_user
      - RABBITMQ_DEFAULT_PASS=amarvote_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    networks:
      - dev_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amarvote_backend_dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/amarvote_db
      - SPRING_DATASOURCE_USERNAME=amarvote_user
      - SPRING_DATASOURCE_PASSWORD=amarvote_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DEVTOOLS_RESTART_ENABLED=true
      - SPRING_DEVTOOLS_LIVERELOAD_ENABLED=true
      - RAG_SERVICE_URL=http://rag-service:5001
      - BLOCKCHAIN_SERVICE_URL=${VOTING_API_URL:-http://localhost:3001}
      - MASTER_KEY_PQ=${MASTER_KEY_PQ:-dev_master_key}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - CLOUDINARY_NAME=${CLOUDINARY_NAME:-}
      - CLOUDINARY_KEY=${CLOUDINARY_KEY:-}
      - CLOUDINARY_SECRET=${CLOUDINARY_SECRET:-}
      - LOG_PASSWORD=${LOG_PASSWORD:-devpassword}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-admin@localhost}
      - CREDENTIALS_DIRECTORY=/app/data/credentials
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=amarvote_user
      - SPRING_RABBITMQ_PASSWORD=amarvote_password
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=
      - ELECTIONGUARD_API_URL=http://electionguard-api:5000
      - ELECTIONGUARD_WORKER_URL=http://electionguard-worker:5001
      - JAVA_OPTS=-Xms64m -Xmx256m -XX:+UseG1GC
    volumes:
      - maven_repo_dev:/root/.m2
      - credentials_data_dev:/app/data/credentials
      - ./backend/src/main/resources/templates:/app/templates:ro
    networks:
      - dev_net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: amarvote_frontend_dev
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - dev_net
    depends_on:
      - backend

  electionguard-api:
    build:
      context: ./Microservice
      dockerfile: Dockerfile.api
    container_name: electionguard_api_dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - dev_net
    environment:
      - FLASK_DEBUG=1
      - MASTER_KEY_PQ=${MASTER_KEY_PQ:-dev_master_key}
    volumes:
      - ./Microservice/io:/app/io:rw

  electionguard-worker:
    build:
      context: ./Microservice
      dockerfile: Dockerfile.worker
    container_name: electionguard_worker_dev
    restart: unless-stopped
    ports:
      - "5001:5001"
    networks:
      - dev_net
    environment:
      - FLASK_DEBUG=1
      - MASTER_KEY_PQ=${MASTER_KEY_PQ:-dev_master_key}
    volumes:
      - ./Microservice/io:/app/io:rw

volumes:
  postgres_data_dev:
  maven_repo_dev:
  rabbitmq_data_dev:
  credentials_data_dev:

networks:
  dev_net:
    driver: bridge