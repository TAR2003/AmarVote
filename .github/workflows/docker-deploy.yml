# Build images in GitHub Actions, push to GHCR, then pull + swap on the VM.
# Requires repo secret GHCR_READ_TOKEN (classic PAT with read:packages) for VM docker login.
# Server .env stays at ~/.env — copied to ~/app/.env each deploy (not from git).

name: Deploy to VM

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: tar2003

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            dockerfile: Dockerfile
          - name: frontend
            context: frontend
            dockerfile: Dockerfile
          - name: electionguard-api
            context: Microservice
            dockerfile: Dockerfile.api
          - name: electionguard-worker
            context: Microservice
            dockerfile: Dockerfile.worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/amarvote-${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/amarvote-${{ matrix.name }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Test SSH
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "echo '✅ SSH Connected'"

      - name: Prepare VM directory
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "mkdir -p ~/app"

      # Config + runtime mounts only — app images are pulled from GHCR.
      - name: Copy files to VM
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='frontend/src' \
            --exclude='backend/target' \
            --exclude='load-tests' \
            --exclude='.env' \
            --exclude='backend/logs' \
            --exclude='nginx/certs' \
            --exclude='.github' \
            --exclude='docs' \
            --exclude='blockchain' \
            --exclude='blockchain-microservice' \
            --exclude='rag-service' \
            --exclude='__pycache__' \
            --exclude='test-results' \
            ./ ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }}:~/app/

      - name: Copy .env from home to app
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cp ~/.env ~/app/.env && \
           echo '✅ .env copied' && \
           ls -la ~/app/.env"

      - name: Log in to GHCR on VM
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "echo '${GHCR_READ_TOKEN}' | docker login ${{ env.REGISTRY }} -u ${{ env.IMAGE_OWNER }} --password-stdin"

      - name: Deploy pre-built images
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=60 \
          -o ServerAliveCountMax=10 \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "export IMAGE_TAG='${{ github.sha }}' && chmod +x ~/app/scripts/vm-deploy.sh && ~/app/scripts/vm-deploy.sh"

      - name: Verify deployment
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cd ~/app && docker compose --env-file .env -f docker-compose.prod.yml ps"
