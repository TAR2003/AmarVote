name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # ✅ Test SSH
      - name: Test SSH
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "echo '✅ SSH Connected'"

      # ✅ Prepare directory
      - name: Prepare VM directory
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "mkdir -p ~/app"

      # ✅ Copy project files
      - name: Copy files to VM
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='backend/logs' \
            --exclude='nginx/certs' \
            ./ ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }}:~/app/

      # ✅ COPY EXISTING .env (THIS IS THE KEY FIX)
      - name: Copy .env from home to app
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cp ~/.env ~/app/.env && \
           echo '✅ .env copied' && \
           ls -la ~/app/.env && \
           echo '---- FIRST 5 LINES ----' && \
           head -5 ~/app/.env"

    

     # 🚀 Deploy
      - name: Deploy with Docker
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=60 \
          -o ServerAliveCountMax=10 \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cd ~/app && \
           docker compose --env-file .env -f docker-compose.prod.yml down --remove-orphans || true && \
           docker compose --env-file .env -f docker-compose.prod.yml build && \
           docker compose --env-file .env -f docker-compose.prod.yml up -d --force-recreate && \
           docker system prune -f"

      # ✅ Verify
      - name: Verify deployment
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cd ~/app && docker compose ps"