name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # ✅ Test SSH
      - name: Test SSH
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "echo '✅ SSH Connected'"

      # ✅ Prepare directory
      - name: Prepare VM directory
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "mkdir -p ~/app"

      # ✅ Copy project files
      - name: Copy files to VM
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='backend/logs' \
            ./ ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }}:~/app/

      # ✅ COPY EXISTING .env (THIS IS THE KEY FIX)
      - name: Copy .env from home to app
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cp ~/.env ~/app/.env && \
           echo '✅ .env copied' && \
           ls -la ~/app/.env && \
           echo '---- FIRST 5 LINES ----' && \
           head -5 ~/app/.env"

      # ✅ Validate env
      - name: Validate .env content
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cd ~/app && \
           grep -E 'JWT_SECRET|DB_URL|CLOUDINARY_NAME' .env || echo '⚠️ Missing expected vars'"

      # 🚀 Deploy
      - name: Deploy with Docker
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=60 \
          -o ServerAliveCountMax=10 \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cd ~/app && \
           docker compose --env-file .env -f docker-compose.prod.yml down --remove-orphans || true && \
           docker image prune -af || true && \
           retry() { \
             n=1; \
             max=5; \
             delay=10; \
             while true; do \
               \"$@\" && break; \
               if [ \$n -ge \$max ]; then \
                 echo \"Command failed after \$n attempts: $*\"; \
                 return 1; \
               fi; \
               echo \"Attempt \$n failed. Retrying in \$delay seconds...\"; \
               n=\$((n+1)); \
               sleep \$delay; \
               delay=\$((delay*2)); \
             done; \
           } && \
           retry docker pull node:18-alpine && \
           retry docker pull nginx:alpine && \
           retry docker compose --env-file .env -f docker-compose.prod.yml build --pull && \
           docker compose --env-file .env -f docker-compose.prod.yml up -d --force-recreate"

      # ✅ Verify
      - name: Verify deployment
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cd ~/app && docker compose ps"