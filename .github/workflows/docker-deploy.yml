# Build images in GitHub Actions, push to GHCR, then pull + swap on the VM.
# Requires repo secret GHCR_READ_TOKEN (classic PAT with read:packages) for VM docker login.
# Server .env stays at ~/.env — copied to ~/app/.env each deploy (not from git).

name: Deploy to VM

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: tar2003

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            dockerfile: Dockerfile
          - name: frontend
            context: frontend
            dockerfile: Dockerfile
          - name: electionguard-api
            context: Microservice
            dockerfile: Dockerfile.api
          - name: electionguard-worker
            context: Microservice
            dockerfile: Dockerfile.worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/amarvote-${{ matrix.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/amarvote-${{ matrix.name }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Pack deploy bundle
        run: chmod +x scripts/pack-deploy-bundle.sh && scripts/pack-deploy-bundle.sh deploy-bundle.tgz

      - name: Copy deploy bundle to VM
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" scp \
            -o StrictHostKeyChecking=no \
            deploy-bundle.tgz \
            ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }}:/tmp/deploy-bundle.tgz

          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
            "mkdir -p ~/app/Microservice/io ~/app/nginx/certs && \
             tar xzf /tmp/deploy-bundle.tgz -C ~/app && \
             chmod +x ~/app/scripts/vm-deploy.sh && \
             rm -f /tmp/deploy-bundle.tgz && \
             echo '✅ Deploy bundle extracted'"

      - name: Copy .env from home to app
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cp ~/.env ~/app/.env && echo '✅ .env copied'"

      - name: Log in to GHCR on VM
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "echo '${GHCR_READ_TOKEN}' | docker login ${{ env.REGISTRY }} -u ${{ env.IMAGE_OWNER }} --password-stdin"

      - name: Deploy pre-built images
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=60 \
          -o ServerAliveCountMax=10 \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "export IMAGE_TAG='${{ github.sha }}' && ~/app/scripts/vm-deploy.sh"

      - name: Verify deployment
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh \
          -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cd ~/app && docker compose --env-file .env -f docker-compose.prod.yml ps"
