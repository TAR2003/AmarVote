name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # Test SSH connection
      - name: Test SSH
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "echo '✅ SSH Connected'"

      # Create app directory
      - name: Prepare VM
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "mkdir -p ~/app"

      # Upload project files
      - name: Copy files to VM
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='backend/logs' \
            ./ ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }}:~/app/

      # OPTIONAL: create .env from GitHub Secret
      - name: Create .env on VM
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "echo '${{ secrets.ENV_FILE }}' > ~/app/.env"

      # Deploy with Docker
      - name: Deploy
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cd ~/app && \
           docker compose -f docker-compose.prod.yml down --remove-orphans || true && \
           docker system prune -af || true && \
           docker compose -f docker-compose.prod.yml build && \
           docker compose -f docker-compose.prod.yml up -d"

      # Verify
      - name: Verify deployment
        run: |
          sshpass -p "${{ secrets.VM_SECRET }}" ssh -o StrictHostKeyChecking=no \
          ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} \
          "cd ~/app && docker compose ps"