spring.application.name=amarvote

# Use the direct URL from environment variable
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
# Release DB connections after each repository call — do not hold through long HTTP/crypto work
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Timezone Configuration - Force UTC for all database operations
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.forward-headers-strategy=framework

deepseek.api.url=https://openrouter.ai/api/v1/chat/completions
deepseek.api.key=${DEEPSEEK_API_KEY}

# RAG Service Configuration
rag.service.url=${RAG_SERVICE_URL}

# ElectionGuard Service Configuration
# API Service - Fast user-facing operations (setup_guardians, create_encrypted_ballot, benaloh_challenge, encrypt, decrypt)
electionguard.api.url=${ELECTIONGUARD_API_URL:http://electionguard-api:5000}
# Worker Service - Heavy cryptographic operations (create_encrypted_tally, create_partial_decryption, create_compensated_decryption, combine_decryption_shares)
electionguard.worker.url=${ELECTIONGUARD_WORKER_URL:http://electionguard-worker:5001}
# Legacy base URL for backward compatibility (defaults to API service)
electionguard.base.url=${ELECTIONGUARD_API_URL:http://electionguard-api:5000}
electionguard.connection.timeout=10000
electionguard.socket.timeout=600000
electionguard.connection.request.timeout=10000

# RabbitMQ Worker Concurrency Configuration
# Controls the number of concurrent workers processing tasks across all queues
# Format: min-max (e.g., "4-4" means exactly 4 workers, "1-8" allows 1 to 8 workers)
# 
# Impact:
# - Lower values (1-2): Sequential processing, lower memory usage, slower throughput
# - Medium values (4-6): Balanced performance, recommended for most setups
# - Higher values (8-16): Maximum parallel processing, higher memory usage, faster throughput
# 
# Note: Each worker processes one chunk at a time (prefetch=1). More workers = more concurrent chunks.
# With prefetch=1, multiple workers enable true round-robin processing even when tasks arrive at different times.
# Example: If Task A has 100 chunks and Task B arrives after A processes 20 chunks,
#          Worker 1 can process A's chunk 21 while Worker 2 processes B's chunk 1 simultaneously.
# Recommendation: Use 4-8 workers for fair concurrent processing across multiple guardians/tasks
rabbitmq.worker.concurrency.min=2
rabbitmq.worker.concurrency.max=4

# Dedicated email worker concurrency (processed via email.queue on RabbitMQ)
# Isolated from tally/decryption workers so bulk email traffic cannot starve voting operations.
rabbitmq.email.concurrency.min=4
rabbitmq.email.concurrency.max=12
rabbitmq.email.prefetch=5

# Email delivery resilience (Resend: 5 API calls/sec, up to 100 emails per batch call)
amarvote.email.rate-limit-per-second=5
amarvote.email.batch-size=100
amarvote.email.max-attempts=5
amarvote.email.dlq-retry-interval-ms=300000
amarvote.email.dlq-retry-batch-size=50

resilience4j.ratelimiter.instances.email.limit-for-period=${amarvote.email.rate-limit-per-second:5}
resilience4j.ratelimiter.instances.email.limit-refresh-period=1s
resilience4j.ratelimiter.instances.email.timeout-duration=60s

resilience4j.retry.instances.email.max-attempts=3
resilience4j.retry.instances.email.wait-duration=2s
resilience4j.retry.instances.email.enable-exponential-backoff=true
resilience4j.retry.instances.email.exponential-backoff-multiplier=2
resilience4j.retry.instances.email.retry-exceptions=java.lang.RuntimeException
# Connection pool settings — sized for 4 GB host (EG API: 6 sync workers, postgres max_connections=150)
electionguard.max.connections=16
electionguard.max.per.route=8

# Cap concurrent in-flight EG calls to match Gunicorn workers (fair queue, avoids pool/CPU collapse)
amarvote.electionguard.api.max-concurrent=6
amarvote.electionguard.api.acquire-timeout-ms=180000
amarvote.electionguard.worker.max-concurrent=2
amarvote.electionguard.worker.acquire-timeout-ms=600000
electionguard.connection.request.timeout=60000

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.electionguard.register-health-indicator=true
resilience4j.circuitbreaker.instances.electionguard.sliding-window-size=10
resilience4j.circuitbreaker.instances.electionguard.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.electionguard.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.electionguard.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.electionguard.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.electionguard.slow-call-duration-threshold=300s
resilience4j.circuitbreaker.instances.electionguard.slow-call-rate-threshold=80

# Resilience4j Retry Configuration
resilience4j.retry.instances.electionguard.max-attempts=3
resilience4j.retry.instances.electionguard.wait-duration=2s
resilience4j.retry.instances.electionguard.enable-exponential-backoff=true
resilience4j.retry.instances.electionguard.exponential-backoff-multiplier=2

# WebClient Configuration (DEPRECATED - using RestTemplate now)
webclient.buffer.size=10485760
webclient.timeout.response=300000

# HikariCP — sized for concurrent HTTP + workers; postgres max_connections=150
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

jwt.secret=${JWT_SECRET}
jwt.temp-secret=${JWT_TEMP_SECRET}
jwt.expiration=3600000

# Cookie Security Settings
cookie.secure=${COOKIE_SECURE:false}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=amarvote2025@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# Resend Configuration (optional). If key is present, HTML emails are sent via Resend.
resend.api.key=${RESEND_API_KEY:}
resend.from.email=AmarVote Team <noreply@mail.amarvote2026.me>

# Email provider: auto (Resend when API key set, else SMTP), resend, or smtp
email.provider=${EMAIL_PROVIDER:resend}

# CORS (comma-separated origins)
amarvote.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://amarvote2026.me,http://localhost:5173,http://localhost:3000}

# Chatbot disabled by default in production
amarvote.chatbot.enabled=${AMARVOTE_CHATBOT_ENABLED:false}

# ElectionGuard internal service auth
electionguard.internal.api-key=${ELECTIONGUARD_INTERNAL_API_KEY:}


# Server Configuration
server.port=8080
server.address=0.0.0.0

# Async request timeout (5 minutes for computationally intensive operations)
spring.mvc.async.request-timeout=300000

# Async Execution for tally/chunk processing (background — keep small on 4 GB host)
spring.task.execution.pool.core-size=8
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=500
spring.task.execution.pool.keep-alive=60s
spring.task.execution.thread-name-prefix=chunk-processor-

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.connection-timeout=30000
spring.rabbitmq.requested-heartbeat=60
spring.servlet.multipart.enabled=true

# Redis Configuration for secure temporary credential storage
# Redis stores sensitive data in-memory with automatic expiration (TTL)
# Industry standard for temporary secrets, session data, and cache
spring.data.redis.host=${SPRING_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.timeout=5000
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5

# Tomcat — match EG throughput (4 concurrent encrypts) + queue excess instead of unbounded threads
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=20
server.tomcat.max-connections=2000
server.tomcat.accept-count=200
server.tomcat.connection-timeout=60000

# RAG Service Configuration (5 minutes timeout)
rag.service.timeout=300000


# Blockchain Service Configuration (disabled until Ganache/service is deployed)
blockchain.enabled=${BLOCKCHAIN_ENABLED:false}
blockchain.service.url=${BLOCKCHAIN_SERVICE_URL:}

# Cloudinary Configuration
cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_KEY}
cloudinary.api_secret=${CLOUDINARY_SECRET}

# AmarVote Chunking Configuration
amarvote.chunking.chunk-size=200

# AmarVote OTP Configuration
amarvote.otp.validity-minutes=5

# Send vote receipt email after casting (async via RabbitMQ). Default: disabled.
amarvote.email.send-after-vote=true

# AmarVote Credentials Configuration
# Directory for storing temporary credential files
# In production, use an absolute path or mounted volume
amarvote.credentials.directory=${CREDENTIALS_DIRECTORY:credentials}
# Enable secure deletion (overwrite files before deletion)
amarvote.credentials.secure-delete=true
# Maximum credential file size in MB
amarvote.credentials.max-file-size-mb=10

# API access logging (metadata only — no JWTs or request bodies)
amarvote.api-logging.enabled=true
amarvote.api-logging.retention-days=90
amarvote.api-logging.purge-cron=0 0 3 * * *
amarvote.api-logging.async.core-pool-size=2
amarvote.api-logging.async.max-pool-size=6
amarvote.api-logging.async.queue-capacity=8192

# Actuator & Prometheus Configuration
# Actuator & Prometheus Configuration
# Actuator & Prometheus Configuration (Spring Boot 3.5.0+)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator
# Add application label to metrics
management.metrics.tags.application=AmarVote Backend
