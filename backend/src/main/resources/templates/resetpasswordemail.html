<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset — AmarVote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #efebf8;
      font-family: Inter, Helvetica, Arial, sans-serif;
      color: #1b1d2e;
      -webkit-font-smoothing: antialiased;
    }
    .outer {
      width: 100%;
      background: #efebf8;
      padding: 40px 16px;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background: #f7f4ec;
      border: 1px solid rgba(27, 29, 46, 0.12);
      border-radius: 12px;
      overflow: hidden;
    }
    .accent {
      height: 4px;
      background: #8b7fe8;
    }
    .header {
      padding: 28px 32px 12px;
      text-align: center;
    }
    .wordmark {
      font-family: Fraunces, Georgia, 'Times New Roman', serif;
      font-size: 28px;
      font-weight: 600;
      color: #5c52c4;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .content {
      padding: 8px 32px 32px;
      line-height: 1.6;
      font-size: 16px;
      color: #1b1d2e;
    }
    .content h2 {
      font-family: Fraunces, Georgia, 'Times New Roman', serif;
      font-size: 22px;
      font-weight: 500;
      color: #12142b;
      text-align: center;
      margin: 16px 0 20px;
    }
    .button {
      display: inline-block;
      margin: 24px 0;
      padding: 14px 28px;
      background-color: #5c52c4;
      color: #f7f4ec !important;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      font-family: Inter, Helvetica, Arial, sans-serif;
    }
    .cta-wrap {
      text-align: center;
    }
    .warning {
      font-size: 14px;
      color: #5b5d74;
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }
    .footer {
      text-align: center;
      font-size: 13px;
      color: #5b5d74;
      padding: 0 32px 28px;
    }
  </style>
</head>
<body>
  <div class="outer">
    <div class="card">
      <div class="accent"></div>
      <div class="header">
        <p class="wordmark">AmarVote</p>
      </div>
      <div class="content">
        <h2>Password Reset Request</h2>
        <p>Hi there,</p>
        <p>You requested to reset your password. Please click the button below to continue:</p>
        <div class="cta-wrap">
          <a href="{{RESET_LINK}}" class="button">Reset Password</a>
        </div>
        <p class="warning">If you didn't request this, please ignore this email.<br>The link will expire in 15 minutes for your security.</p>
      </div>
      <div class="footer">
        &copy; 2026 AmarVote. All rights reserved.
      </div>
    </div>
  </div>
</body>
</html>
